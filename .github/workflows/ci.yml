name: tests

# Trava regressões: roda a suíte a cada PR (e em pushes na main). Os testes são
# unitários e não tocam a rede (monkeypatch/lógica pura), então rodam offline.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -q
