name: tests

# Trava regressões: roda a suíte a cada PR (e em pushes na main). Os testes são
# unitários e não tocam a rede (monkeypatch/lógica pura), então rodam offline.
# Usa o Python 3 já presente no runner ubuntu-latest (sem actions/setup-python).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: python3 -m pip install --upgrade pip -r requirements.txt
      - name: Run tests
        run: python3 -m pytest tests/ -q
