name: tests

# Roda a suíte a cada PR e a cada push na main. Os testes são unitários e
# offline (monkeypatch / lógica pura), então não precisam de rede nem de
# POKEMONTCG_API_KEY — o CI instala as deps e roda pytest, só isso.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest tests/ -q
